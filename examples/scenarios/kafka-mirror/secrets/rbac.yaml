apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-secret-reader
  namespace: kafka-target
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-secret-reader
  namespace: kafka-source
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-secret-reader
  namespace: kafka-source
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-secret-reader
subjects:
  - kind: ServiceAccount
    name: eso-secret-reader
    namespace: kafka-target
