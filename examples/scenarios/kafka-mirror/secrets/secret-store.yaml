apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: kafka-source-store
  namespace: kafka-target
spec:
  provider:
    kubernetes:
      remoteNamespace: kafka-source
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-secret-reader
