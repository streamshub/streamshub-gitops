apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: streamshub-gitops-scenarios
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/streamshub/streamshub-gitops.git
        revision: HEAD
        directories:
          - path: examples/scenarios/*
  template:
    metadata:
      name: '{{ .path.basename }}'
      labels:
        app.kubernetes.io/part-of: streamshub-gitops
        app.kubernetes.io/managed-by: argocd
    spec:
      project: streamshub
      source:
        repoURL: https://github.com/streamshub/streamshub-gitops.git
        # TODO: switch back to HEAD before merge
        targetRevision: argocd-kafka-examples
        path: '{{ .path }}'
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: false
          selfHeal: true
        managedNamespaceMetadata:
          labels:
            argocd.argoproj.io/managed-by: argocd
        syncOptions:
          - CreateNamespace=true
